{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center align-items-center text-center py-5 my-5">
    <div class="col-md-8 col-lg-6">
        
        <div class="error-container mb-4">
            <h1 class="error-code display-1 fw-black m-0">404</h1>
        </div>
        
        <h2 class="fw-bold text-white mb-3 fs-3">Lost in Space?</h2>
        <p class="text-muted mb-5 fs-5 mx-auto" style="max-width: 460px; line-height: 1.7;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
        </p>
        
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a href="{% url 'index' %}" class="btn btn-primary px-4 py-3 fw-semibold">
                Return to Careers
            </a>
            <a href="{% url 'contact' %}" class="btn btn-outline-custom px-4 py-3 fw-semibold">
                Report This Issue
            </a>
        </div>
        
    </div>
</div>

{% endblock %}

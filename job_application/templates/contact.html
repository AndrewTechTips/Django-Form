{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Get in Touch</h1>
            <p class="text-muted">Have a question or just want to say hi? We'd love to hear from you.</p>
        </div>

        <div class="card p-4 p-md-5">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="name" class="form-label fw-semibold">Your Name</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="mb-4">
                    <label for="message" class="form-label fw-semibold">How can we help?</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required placeholder="Tell us more about your inquiry..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3">Send Message</button>
            </form>
        </div>

        {% if messages %}
            <div class="mt-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</div>

{% endblock %}
